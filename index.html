    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fcfcfc;
            color: #1a1a1a;
        }
        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }
        .snap-container {
            scroll-snap-type: y mandatory;
            height: 100vh;
            overflow-y: scroll;
            scrollbar-width: none; /* Firefox */
        }
        .snap-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }
        section {
            scroll-snap-align: start;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .gold-accent {
            color: #C5A059;
        }
        .btn-gold {
            background: linear-gradient(135deg, #C5A059 0%, #E2C285 100%);
            transition: all 0.4s ease;
        }
        .btn-gold:hover {
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3);
        }
        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #C5A059;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #C5A059;
        }
        /* Pulse Animation */
        @keyframes pulse-custom {
            0% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(10px); opacity: 1; }
            100% { transform: translateY(0); opacity: 0.3; }
        }
        .animate-pulse-slow {
            animation: pulse-custom 3s infinite;
        }
    </style>
</head>
